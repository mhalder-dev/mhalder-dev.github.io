<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page not found · Mithun Halder</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='26' fill='%2363e6a3'/%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='%2363e6a3' stroke-opacity='.35' stroke-width='9'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0a0c0d;
  --surface:#12161a;
  --line:rgba(255,255,255,.09);
  --text:#c3ccd2;
  --head:#f3f6f7;
  --muted:#7f8b94;
  --accent:#63e6a3;
  --accent-ink:#04140c;
  --accent-soft:rgba(99,230,163,.12);
  --accent-line:rgba(99,230,163,.28);
  --sans:"Inter",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --disp:"Space Grotesk",var(--sans);
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.65;
  min-height:100vh;display:grid;place-items:center;padding:28px;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(48ch 40ch at 92% -8%, rgba(99,230,163,.10), transparent 62%);
  background-repeat:no-repeat;
}
a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.card{max-width:520px;text-align:center;border:1px solid var(--line);border-radius:22px;
  background:linear-gradient(160deg,rgba(99,230,163,.08),transparent 55%),var(--surface);padding:56px 36px}
.code{font-family:var(--mono);font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:6px;
  display:inline-block;padding:4px 12px;margin-bottom:20px}
h1{font-family:var(--disp);color:var(--head);font-weight:600;letter-spacing:-.02em;
  font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.1;margin-bottom:14px}
p{color:var(--muted);font-size:1rem;margin-bottom:30px}
.btn{font-family:var(--sans);font-weight:600;font-size:.92rem;padding:12px 22px;border-radius:10px;
  background:var(--accent);color:var(--accent-ink);text-decoration:none;display:inline-block;transition:.18s ease}
.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<main class="card">
  <span class="code">404</span>
  <h1>This page doesn't exist.</h1>
  <p>The route you followed has no destination — much like an unmapped supplier endpoint.</p>
  <a class="btn" href="/">Back to the homepage</a>
</main>
</body>
</html>
